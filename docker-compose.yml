services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

    healthcheck:
      test: ["CMD", "sh", "-c", "echo ruok | nc localhost 2181"]
      interval: 20s
      timeout: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka

    depends_on:
      zookeeper:
        condition: service_healthy

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 20s
      timeout: 10s
      retries: 5

  flink-jobmanager:
    image: flink:1.18
    container_name: flink-jobmanager

    command: jobmanager

    ports:
      - "8081:8081"

    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 20s
      timeout: 10s
      retries: 5

  flink-taskmanager:
    image: flink:1.18
    container_name: flink-taskmanager

    command: taskmanager

    depends_on:
      flink-jobmanager:
        condition: service_started

    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager

    healthcheck:
      test: ["CMD", "bash", "-c", "echo healthy"]
      interval: 20s
      timeout: 10s
      retries: 5

  flink-job:
    build: ./flink-job
    container_name: flink-job

    depends_on:
      kafka:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_healthy

    working_dir: /opt/flink/job

    command: tail -f /dev/null

    healthcheck:
      test: ["CMD", "bash", "-c", "echo healthy"]
      interval: 20s
      timeout: 10s
      retries: 5

  producer:
    build: ./producer

    depends_on:
      kafka:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "bash", "-c", "echo healthy"]
      interval: 20s
      timeout: 10s
      retries: 5

  dashboard:
    build: ./dashboard

    depends_on:
      kafka:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "bash", "-c", "echo healthy"]
      interval: 20s
      timeout: 10s
      retries: 5